<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bezahlen - Lumio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <header>
        <a href="index.html" class="logo">
            <img src="img/logo.png" alt="Lumio Logo">
        </a>
        <h1>Bezahlen</h1>
    </header>

    <main class="checkout-container">
        <h2>Bestellung abschließen</h2>
        <form id="payment-form">
            <label for="name">Name</label>
            <input type="text" id="name" required>

            <label for="address">Adresse</label>
            <input type="text" id="address" required>

            <label for="payment-method">Zahlungsmethode</label>
            <select id="payment-method">
                <option value="paypal">PayPal</option>
                <option value="credit-card">Kreditkarte</option>
                <option value="klarna">Klarna</option>
            </select>

            <button type="submit">Zahlung abschließen</button>
        </form>
    </main>

    <script>
        document.getElementById("payment-form").addEventListener("submit", (event) => {
            event.preventDefault();
            alert("Vielen Dank für deine Bestellung! 🎉");
            localStorage.removeItem("cart"); // Warenkorb leeren
            window.location.href = "index.html"; // Zurück zur Startseite
        });
    </script>
</body>
</html>
