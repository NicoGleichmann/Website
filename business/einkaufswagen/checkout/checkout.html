<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bezahlen - Lumio</title>
    <link rel="stylesheet" href="/business/einkaufswagen/checkout/checkout.css">
</head>
<body class="dark-mode">
    <header>
        <a href="/business/business.html" class="logo">
            <img src="/img/logo_w.png" alt="Lumio Logo">
        </a>
        <h1>Bezahlen</h1>
    </header>

    <main class="checkout-container">
        <div class="checkout-container">
            <h2>Wähle deine Zahlungsmethode</h2>
            
            <select id="payment-method">
                <option value="creditcard">💳 Kreditkarte</option>
                <option value="paypal">🅿️ PayPal</option>
                <option value="applepay">🍏 Apple Pay</option>
            </select>
        
            <div id="payment-form">
                <h2>Bestellung abschließen</h2>
        <form id="payment-form">
            <label for="name">Name</label>
            <input type="text" id="name" required>

            <label for="address">Adresse</label>
            <input type="text" id="address" required>

        </form>
            </div>
        
            <button id="pay-now">Jetzt bezahlen</button>
            <a href="/business/einkaufswagen/einkaufwagen.html" class="back-link">⬅ Zurück zum Warenkorb</a>
        </div>
    </main>

    <script>
        document.getElementById("payment-form").addEventListener("submit", (event) => {
            event.preventDefault();
            alert("Vielen Dank für deine Bestellung! 🎉");
            localStorage.removeItem("cart"); // Warenkorb leeren
            window.location.href = "/business/business.html"; // Zurück zur Startseite
        });
    </script>
</body>
</html>
